services:
  server:
    build: ./server
    container_name: bank-server
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./server/database.sqlite:/app/database.sqlite
      - ./server/uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000

  client:
    build: ./client
    container_name: bank-client
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - server
